<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendrier du Village</title>

  <!-- CSS -->
  <link rel="stylesheet" href="./stylesManifest + PWA -->
  ./manifest.v3.webmanifest
  <meta name="theme-color" content="#008000">
</head>

<body>

  <h1>Calendrier du Village</h1>

  <!-- PARAMÈTRES -->
  <div class="params">
    <label>Année :
      <input id="param-annee" type="number" min="1900" max="2500">
    </label>

    <label>Mois :
      <input id="param-mois" type="number" min="1" max="12">
    </label>

    <label>Village :
      <select id="param-village">
        <option value="ALL">Tous</option>
      </select>
    </label>

    <label>Filtre :
      <select id="param-filtre">
        <option value="tous">Tous</option>
        <option value="marché">Marchés</option>
        <option value="interdits">Interdits</option>
      </select>
    </label>
  </div>

  <!-- NAVIGATION -->
  <div class="nav-row">
    prevY⏮ Année -1</button>
    prev3◀ -3 mois</button>
    todayAujourd’hui</button>
    next3+3 mois ▶</button>
    nextY⏭ Année +1</button>
  </div>

  <!-- META VILLAGE -->
  <h2>Roi : <span id="roi-village">—</span></h2>
  <p>Jours de marché : <span id="marche-village">—</span></p>
  <p>Informations : <span id="motif-village">—</span></p>

  <!-- CALENDRIER -->
  <div id="calendar-9cols" data-watermark="VILLAGE"></div>

  <!-- SCRIPT -->
  <script src="./app.v3.js</script>

<!-- DEBUG OVERLAY (temporaire) -->
<div id="debug" style="
  position:fixed;left:0;bottom:0;width:100%;max-height:45%;
  background:rgba(10,10,10,.88);color:#0f0;font:12px/1.3 monospace;
  padding:8px;overflow:auto;z-index:99999;white-space:pre-wrap;">
</div>
<script>
(function(){
  const box = document.getElementById('debug');
  function log(msg){ box.textContent += msg + "\n"; }
  log("📱 Debug mobile activé — " + new Date().toISOString());

  // erreurs synchrones
  window.addEventListener('error', (e)=>{
    log("❌ ERREUR: " + e.message + " @ " + e.filename + ":" + e.lineno + ":" + e.colno);
  });
  // promesses non gérées
  window.addEventListener('unhandledrejection', (e)=>{
    log("❌ PROMESSE NON GÉRÉE: " + (e.reason && e.reason.message ? e.reason.message : e.reason));
  });

  // vérifie le chargement CSS/JS/JSON
  (async ()=>{
    try {
      const css = document.querySelector('link[rel="stylesheet"]')?.href;
      log("🧩 CSS = " + (css || "introuvable"));
      const js = [...document.scripts].map(s=>s.src).filter(Boolean);
      log("🧩 SCRIPTS = " + (js.length? js.join(", ") : "aucun"));
    } catch(err){ log("⚠️ Check ressources: " + err); }

    // ping JSON pour voir si accessible
    try {
      const u = "./data.v3.json?v="+Date.now();
      const r = await fetch(u, {cache:"no-store"});
      log("📥 data.v3.json status = " + r.status);
      if(!r.ok){ log("⚠️ data.v3.json inaccessible"); }
    } catch(err){ log("❌ fetch data.v3.json: " + err); }
  })();
})();
</script>
    
</body>
</html>
