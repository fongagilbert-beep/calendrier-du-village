<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calendrier du Village</title>
  <link rel="stylesheet" href="./styles.v3body>

  <!-- BANDEAU BLEU TITRE -->
  <div class="site-header" 
       style="background:#004aad;color:#fff;padding:1.2rem;text-align:center;font-size:2rem;font-weight:800;">
    Calendrier du Village
  </div>

  <!-- BOUTONS DE NAVIGATION -->
  <div class="nav-row" style="
    display:flex;
    justify-content:center;
    gap:0.5rem;
    background:#e9f1ff;
    padding:0.8rem;
    margin-top:1rem;
  ">
    <button type="button" data-action="prev3" class="   todayAujourd’hui</button>
    prevY-1 an</button>
    nextY+1 an</button>
  </div>

  <!-- PARAMÈTRES -->
  <div class="params">
    <label>Année (M) :
      <input id="param-annee" type="number" min="1900" max="2500">
    </label>

    <label>Mois (M) :
      <input id="param-mois" type="number" min="1" max="12">
    </label>

    <label>Village :
      <select id="param-village">
        <option value="ALL">Tous</option>
      </select>
    </label>

    <label>Filtre :
      <select id="param-filtre">
        <option value="tous">Tous</option>
        <option value="marché">Marchés</option>
        <option value="interdits">Interdits</option>
      </select>
    </label>
  </div>

  <!-- CALENDRIER -->
  <div id="calendar-9cols"></div>

  <!-- BLOC INFOS -->
  <h2>Roi : <span id="roi-village">—</span></h2>
  <p>Jours de marché : <span id="marche-village">—</span></p>
  <p>Informations : <span id="motif-village">—</span></p>

  <!-- SCRIPT PRINCIPAL -->
  <link rel="stylesheet" href="./styles.v3.css?v=20260311">

</body>
</html>
