<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calendrier du Village</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header>
    <h1>Calendrier du Village</h1>
  </header>
  <nav class="nav-row">
    <button data-action="prev">◀ Mois précédent</button>
    <button data-action="today">Aujourd’hui</button>
    <button data-action="next">Mois suivant ▶</button>
  </nav>
  <section class="params-row">
    <div class="params">
      <label>Village :
        <select id="param-village">
          <option value="all">Tous</option>
          <option value="villageA">Village A</option>
          <option value="villageB">Village B</option>
        </select>
      </label>
    </div>
  </section>
  <main id="calendar-9cols" class="c9" aria-live="polite" aria-busy="false"></main>
  <nav class="nav-row">
    <button data-action="prev">◀ Mois précédent</button>
    <button data-action="today">Aujourd’hui</button>
    <button data-action="next">Mois suivant ▶</button>
  </nav>
  <footer class="footer">
    <small>© Calendrier du Village</small>
  </footer>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js');
      });
    }
  </script>
  <script src="./app.js" type="module"></script>
</body>
</html>
