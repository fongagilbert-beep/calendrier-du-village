<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Calendrier du Village</title>

  <!-- CSS – versionné pour casser le cache -->
  ./styles.css?v=20260310-1

  <!-- Manifest – versionné -->
  ./manifest.webmanifest?v=20260310-1

  <!-- iOS / Android -->
  <meta name="theme-color" content="#0053c9"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  ./icons/icon-192.png
</head>

<body>

  <header class="site-header">
    <h1>Calendrier du Village</h1>
  </header>

  <nav class="nav-vibrant">
    <div class="params-row">
      <label for="param-village">Village : </label>
      <select id="param-village"></select>

      <button id="btnInstall" class="btn install" style="display:none;">
        Installer l’app
      </button>
    </div>
  </nav>

  <main id="calendar-9cols" data-watermark=""></main>

  <section class="info-bottom">
    <div class="legend">
      <span class="chip market">Jour de marché</span>
      <span class="chip forbid">Jour interdit</span>
      <span class="chip today">Aujourd’hui</span>
    </div>
    <div class="village-meta">
      <strong id="meta-roi">Roi : —</strong>
      <span id="meta-marche">Jours de marché : —</span>
      <span id="meta-info">Informations : —</span>
    </div>
  </section>

  <!-- Tip iOS -->
  <div id="ios-tip" style="display:none;
        background:#fff9d6;border:1px dashed #ffb300;
        padding:8px 10px;border-radius:8px;color:#6a4a00;
        font-weight:600;max-width:780px;margin:10px auto;">
      Sur iPhone : “Partager” → “Ajouter à l’écran d’accueil”
  </div>

  <!-- JS – versionné -->
  ./app.js?v=20260310-1</script>

  <!-- SW minimal (aucun cache figé) -->
  <script>
    (function(){
      // Android : bouton Installer
      let deferredPrompt=null;
      window.addEventListener('beforeinstallprompt',(e)=>{
        e.preventDefault(); deferredPrompt=e;
        document.getElementById('btnInstall').style.display='inline-block';
      });
      document.getElementById('btnInstall')?.addEventListener('click',async()=>{
        if(!deferredPrompt) return;
        deferredPrompt.prompt();
        try{ await deferredPrompt.userChoice; }catch(e){}
        deferredPrompt=null;
      });

      // iOS : tip si pas standalone
      const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
      const isStandalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
      if(isIOS && !isStandalone){
        document.getElementById('ios-tip').style.display='block';
        setTimeout(()=>document.getElementById('ios-tip').style.display='none',8000);
      }

      // Service Worker (zéro cache)
      if('serviceWorker' in navigator){
        navigator.serviceWorker.register('./sw.js?v=20260310-1').catch(console.error);
      }
    })();
  </script>

</body>
</html>
