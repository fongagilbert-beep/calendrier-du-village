<!doctype html>
<meta charset="utf-8">
<title>Probe JSON</title>
<pre id="out">Test en cours…</pre>
<script>
(async () => {
  const out = document.getElementById('out');
  try {
    const res = await fetch('./data/villages.json');
    out.textContent = 'HTTP status: ' + res.status;
    const txt = await res.text();
    out.textContent += '\n\nDébut du contenu:\n' + txt.slice(0,200) + '...';
    // Essai parse JSON
    const data = JSON.parse(txt);
    out.textContent += '\n\nPARSE JSON: OK';
    out.style.color = 'green';
  } catch (e) {
    out.textContent += '\n\nERREUR: ' + e.message;
    out.style.color = 'red';
  }
})();
</script>
