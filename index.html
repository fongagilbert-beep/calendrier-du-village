<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendrier du Village</title>

  <!-- CSS -->
  ./styles.v3.css?v=20260311-8

  <!-- Manifest + PWA -->
  <link rel="manifest" href="./manifest.v3theme-color" content="#008000">
</head>

<body>

  <h1>Calendrier du Village</h1>

  <!-- PARAMÈTRES -->
  <div class="params">
    <label>Année :
      <input id="param-annee" type="number" min="1900" max="2500">
    </label>

    <label>Mois :
      <input id="param-mois" type="number" min="1" max="12">
    </label>

    <label>Village :
      <select id="param-village">
        <option value="ALL">Tous</option>
      </select>
    </label>

    <label>Filtre :
      <select id="param-filtre">
        <option value="tous">Tous</option>
        <option value="marché">Marchés</option>
        <option value="interdits">Interdits</option>
      </select>
    </label>
  </div>

  <!-- NAVIGATION (version correcte, comme sur PC) -->
  <div class="nav-row">
    prev3◀ -3 mois</button>
    next3+3 mois ▶</button>
    todayAujourd’hui</button>
    prevY⏮ -1 an</button>
    nextY⏭ +1 an</button>
  </div>

  <!-- META VILLAGE -->
  <h2>Roi : <span id="roi-village">—</span></h2>
  <p>Jours de marché : <span id="marche-village">—</span></p>
  <p>Informations : <span id="motif-village">—</span></p>

  <!-- CALENDRIER -->
  <div id="calendar-9cols" data-watermark="VILLAGE"></div>

  <!-- SCRIPT PRINCIPAL -->
  </app.v3.js?v=20260311-8</script>

</body>
</html>
