<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Calendrier du Village</title>

  <!-- CSS versionné (casse le cache) -->
  ./styles.v3.css?v=20260310-2

  <!-- Manifest versionné -->
  ./manifest.v3.webmanifest?v=20260310-2

  <!-- Thème / iOS PWA -->
  <meta name="theme-color" content="#0053c9" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  ./icons/icon-192.png
</head>

<body>

  <header class="site-header">
    <h1>Calendrier du Village</h1>
  </header>

  <nav class="nav-vibrant">
    <div class="params-row">
      <label for="param-village">Village :</label>
      <select id="param-village"></select>
      <button id="btnInstall" class="btn install" style="display:none;">Installer l’app</button>
    </div>
  </nav>

  <main id="calendar-9cols" data-watermark=""></main>

  <section class="info-bottom">
    <div class="legend">
      <span class="chip market">Jour de marché</span>
      <span class="chip forbid">Jour interdit</span>
      <span class="chip today">Aujourd’hui</span>
    </div>
    <div class="village-meta">
      <strong id="meta-roi">Roi : —</strong>
      <span id="meta-marche">Jours de marché : —</span>
      <span id="meta-info">Informations : —</span>
    </div>
  </section>

  <!-- Tip iOS (facultatif) -->
  <div id="ios-tip" style="display:none;background:#fff9d6;border:1px dashed #ffb300;padding:8px 10px;border-radius:8px;color:#6a4a00;font-weight:600;max-width:780px;margin:10px auto;">
    Sur iPhone : « Partager » → « Ajouter à l’écran d’accueil »
  </div>

  <!-- JS principal versionné -->
  <script defer src="./app.v3.js?v=20260310-2nregistrement SW minimal (zéro cache agressif) + bouton Installer -->
  <script>
  (function () {
    // Bouton "Installer l’app" (Android)
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault(); deferredPrompt = e;
      const btn = document.getElementById('btnInstall');
      if (btn) btn.style.display = 'inline-block';
    });
    document.getElementById('btnInstall')?.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      try { await deferredPrompt.userChoice; } catch(e) {}
      deferredPrompt = null;
      document.getElementById('btnInstall').style.display = 'none';
    });

    // iOS : tip si pas en standalone
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
    if (isIOS && !isStandalone) {
      const tip = document.getElementById('ios-tip');
      if (tip) { tip.style.display = 'block'; setTimeout(() => tip.style.display = 'none', 8000); }
    }

    // Service Worker minimal (pas de cache figé)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.v3.js?v=20260310-2').catch(console.error);
    }
  })();
  </script>

<div id="debug" style="
    position: fixed;
    bottom: 0;
    left: 0;
    background: rgba(0,0,0,0.7);
    color: #0f0;
    font-size: 12px;
    max-height: 40%;
    overflow-y: auto;
    padding: 6px;
    width: 100%;
    z-index: 99999;
    white-space: pre-wrap;
"></div>

<script>
(function() {
    const box = document.getElementById("debug");

    function log(msg) {
        box.textContent += msg + "\n";
    }

    window.addEventListener("error", (e) => {
        log("❌ ERREUR : " + e.message + " @ " + e.filename + ":" + e.lineno);
    });

    window.addEventListener("unhandledrejection", (e) => {
        log("❌ PROMESSE NON GÉRÉE : " + e.reason);
    });

    log("📱 Débogage mobile activé");
})();
</script>


</body>
</html>
