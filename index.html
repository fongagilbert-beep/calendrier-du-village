<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calendrier du Village — Proposé par Gilbert FONGA</title>
manifest.webmanifest
  <meta name="theme-color" content="#1A237E">
  <style>
    :root{
      --primary:#1A237E; --accent:#FFB300; --forbidden:#D32F2F; --cacao:#5D4037;
      --bg:#f7f7fb; --text:#222; --muted:#666; --card:#fff; --row-alt:#f8fafd;
      --sunday:#E4F1FF; --today:#FFE680; --splash:#F3EFE6;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font:14px/1.4 system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial}
    .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:space-between;padding:10px 12px;background:#fff;border-bottom:1px solid #e8e8f0;position:sticky;top:0;z-index:10}
    .nav-group{display:flex;gap:6px;flex-wrap:wrap}
    .selectors{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    label{display:flex;gap:6px;align-items:center}
    select{padding:6px 8px;border:1px solid #dcdce6;border-radius:6px;background:#fff}
    .btn{padding:6px 10px;border:1px solid #dcdce6;background:#fff;border-radius:6px;cursor:pointer}
    .btn:hover{background:#f1f5ff}
    .btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}
    .btn.ghost{background:#fff}
    .badge{background:#eef3ff;color:#2643a0;border:1px solid #cfd8ff;padding:4px 8px;border-radius:999px}
    .exporter{position:relative}
    .export-panel{position:absolute;right:0;top:42px;background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:10px;box-shadow:0 8px 24px rgba(0,0,0,.08);display:grid;gap:8px;min-width:300px}
    .export-panel .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    .export-panel .row.right{justify-content:flex-end}
    .grid{display:grid;gap:12px;grid-template-columns: repeat(3, minmax(260px,1fr));padding:12px;align-items:start}
    .month-card{background:var(--card);border:1px solid #e8e8f0;border-radius:10px;overflow:hidden;position:relative}
    .month-card.focus{outline:3px solid #e8f0ff}
    .month-card h2{margin:0;padding:10px 12px;background:var(--primary);color:#fff;font-size:16px;font-weight:600}
    .cal{width:100%;border-collapse:collapse}
    .cal thead th{background:var(--accent);color:var(--cacao);padding:8px;border-bottom:1px solid #e8e8f0;text-align:left}
    .cal tbody td{padding:6px 8px;border-bottom:1px solid #f0f0f5}
    .cal tbody tr:nth-child(odd){background:var(--row-alt)}
    .cal tbody tr.forbidden td:last-child{font-weight:700;color:#fff;background:var(--forbidden)}
    .cal tbody tr.sunday{background:var(--sunday)}
    .cal tbody tr.today{background:var(--today);font-weight:700}
    .meta{margin:12px;padding:12px;background:#fff;border:1px solid #e8e8f0;border-radius:10px;display:grid;gap:6px}
    .meta .field{padding:4px 0}
    .watermark{user-select:none;pointer-events:none;opacity:.14;position:fixed;left:50%;top:62%;transform:translate(-50%,-50%) rotate(-30deg);font-size:26px;font-weight:700;color:#444;white-space:nowrap}
    @media (max-width:900px){.grid{grid-template-columns:1fr}.watermark{font-size:20px}}
    @media print{.toolbar,.exporter,.export-panel{display:none !important}body{background:#fff}.grid{gap:8px}.month-card h2{padding:8px 10px}.cal thead th{padding:6px 8px}.cal tbody td{padding:5px 6px}.meta{margin:8px;padding:8px}.watermark{opacity:.10}}
    @page{ margin:12mm; background: var(--splash); }
    body.size-a4p{@page{size:A4 portrait}}
    body.size-a4l{@page{size:A4 landscape}}
    body.size-a3p{@page{size:A3 portrait}}
    body.size-a3l{@page{size:A3 landscape}}
  </style>
</head>
<body class="size-a4p">
  <header class="toolbar">
    <div class="nav-group">
      <button id="btnMinus3m" class="btn ghost">&laquo;&laquo; 3 mois</button>
      <button id="btnPlus3m" class="btn ghost">3 mois &raquo;&raquo;</button>
      <button id="btnMinus1y" class="btn ghost">&laquo;&laquo; 1 an</button>
      <button id="btnPlus1y" class="btn ghost">1 an &raquo;&raquo;</button>
      <button id="btnToday" class="btn primary">Aujourd'hui</button>
      <button id="btnGoMTrad" class="btn">Aller à MTrad</button>
    </div>
    <div class="selectors">
      <label>Année <select id="selYear"></select></label>
      <label>Mois <select id="selMonth"></select></label>
      <label>Village <select id="selVillage"></select></label>
      <span id="labelMTrad" class="badge"></span>
    </div>
    <div class="exporter">
      <button id="btnExport" class="btn">Exporter PDF</button>
      <div id="exportPanel" class="export-panel" hidden>
        <div class="row">
          <label><input type="radio" name="psize" value="a4p" checked> A4 Portrait</label>
          <label><input type="radio" name="psize" value="a4l"> A4 Paysage</label>
          <label><input type="radio" name="psize" value="a3p"> A3 Portrait</label>
          <label><input type="radio" name="psize" value="a3l"> A3 Paysage</label>
        </div>
        <div class="row right">
          <button id="doPrint" class="btn primary">Créer le PDF</button>
          <button id="cancelPrint" class="btn ghost">Annuler</button>
        </div>
      </div>
    </div>
  </header>

  <main class="grid">
    <section class="month-card">
      <h2 id="titlePrev"></h2>
      <table class="cal">
        <thead><tr><th>Date</th><th>Jour</th><th>Trad.</th></tr></thead>
        <tbody id="tbodyPrev"></tbody>
      </table>
    </section>
    <section class="month-card focus">
      <h2 id="titleCurr"></h2>
      <table class="cal">
        <thead><tr><th>Date</th><th>Jour</th><th>Trad.</th></tr></thead>
        <tbody id="tbodyCurr"></tbody>
      </table>
    </section>
    <section class="month-card">
      <h2 id="titleNext"></h2>
      <table class="cal">
        <thead><tr><th>Date</th><th>Jour</th><th>Trad.</th></tr></thead>
        <tbody id="tbodyNext"></tbody>
      </table>
    </section>
  </main>

  <footer class="meta">
    <div class="field"><strong>Roi du village</strong> : <span id="roiVillage"></span></div>
    <div class="field"><strong>Jour de marché</strong> :
      <span id="marche1"></span> &nbsp;&nbsp; <span id="marche2"></span> &nbsp;&nbsp; <span id="marche3"></span>
    </div>
    <div class="field"><strong>Informations</strong> : <span id="infosVillage"></span></div>
    <div class="field"><strong>Jours interdits</strong> : <span id="joursInterdits"></span></div>
  </footer>

  <div class="watermark" aria-hidden="true">
    Calendrier du Village — © <span id="yearNow"></span> · Proposé par Gilbert FONGA
  </div>

  <script>
    // ===== CONFIG intégrée =====
    const CFG = {
      anchor: { date: "2026-02-28", jIndex1Based: 1, y: 2026, m: 1, d: 28 }, // m=1 => février
      villages: {
        BAMENA: {
          roi: "Sa Majesté NGIENTCHO",
          infos: "",
          joursMarche: ["Ntah","Mbouh","Tountah"],
          interdits: ["cheu","Tiè","Tah"],
          jCycle: ["cheu","pa","Tiè","quouo","Tah","Ntouhou","Somba","Houa"]
        },
        BANGOU: {
          roi: "Sa Majesté FONGA",
          infos: "Festival annuel — Bal",
          joursMarche: ["Dinkon","Nzeuleug","Guendjou"],
          interdits: ["Nduh","Dintouo","Guendjou"],
          jCycle: ["Dinkon","Dintouo","Guendjou","Ntassak","Nzeuleug","Ntambeté","Guefack","Nduh"]
        },
        BACHINGOU: { roi:"", infos:"Données manquantes", joursMarche:["","",""], interdits:[], jCycle:[] },
        BAZOU:     { roi:"", infos:"Données manquantes", joursMarche:["","",""], interdits:[], jCycle:[] },
        BALENGOU:  { roi:"", infos:"Données manquantes", joursMarche:["","",""], interdits:[], jCycle:[] },
        "BANGANGTÉ": { roi:"", infos:"Données manquantes", joursMarche:["","",""], interdits:[], jCycle:[] }
      }
    };

    // ===== Sélecteurs & éléments =====
    const weekdayFr = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
    const selYear = document.getElementById('selYear');
    const selMonth = document.getElementById('selMonth');
    const selVillage = document.getElementById('selVillage');
    const labelMTrad = document.getElementById('labelMTrad');
    const titlePrev = document.getElementById('titlePrev');
    const titleCurr = document.getElementById('titleCurr');
    const titleNext = document.getElementById('titleNext');
    const tbodyPrev = document.getElementById('tbodyPrev');
    const tbodyCurr = document.getElementById('tbodyCurr');
    const tbodyNext = document.getElementById('tbodyNext');
    const roiVillage = document.getElementById('roiVillage');
    const marche1 = document.getElementById('marche1');
    const marche2 = document.getElementById('marche2');
    const marche3 = document.getElementById('marche3');
    const infosVillage = document.getElementById('infosVillage');
    const joursInterdits = document.getElementById('joursInterdits');

    document.getElementById('yearNow').textContent = new Date().getUTCFullYear();

    // ===== Outils date =====
    function formatMonthTitle(y, m){const noms=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre']; return `${noms[m]} ${y} — M${m+1}`;}
    function daysBetweenUTC(a,b){const dA=Date.UTC(a.getUTCFullYear(),a.getUTCMonth(),a.getUTCDate()); const dB=Date.UTC(b.getUTCFullYear(),b.getUTCMonth(),b.getUTCDate()); return Math.round((dA-dB)/86400000);}
    function daysInMonthUTC(y,m){return new Date(Date.UTC(y,m+1,0)).getUTCDate();}
    function clampMonth(y,m){const d=new Date(Date.UTC(y,m,1));return {y:d.getUTCFullYear(),m:d.getUTCMonth()};}

    // ===== Calcul Trad =====
    function tradNameFor(dateUTC, vCfg){
      const anchor = CFG.anchor;
      const ancDate = new Date(Date.UTC(anchor.y, anchor.m, anchor.d));
      const delta = daysBetweenUTC(dateUTC, ancDate);
      const plus = ((delta % 8) + 8) % 8;
      const idx0 = ((anchor.jIndex1Based - 1) + plus) % 8;
      const cyc = vCfg.jCycle || [];
      if (cyc.length !== 8) return '—';
      return cyc[idx0];
    }

    function renderMonth(y, m, tbody, vCfg){
      tbody.innerHTML = '';
      const total = daysInMonthUTC(y,m);
      const interdits = vCfg.interdits || [];
      for(let d=1; d<=total; d++){
        const date = new Date(Date.UTC(y,m,d));
        const jour = weekdayFr[date.getUTCDay()];
        const trad = tradNameFor(date, vCfg);
        const tr = document.createElement('tr');
        if (jour==='Dimanche') tr.classList.add('sunday');
        const today = new Date();
        if (today.getUTCFullYear()===y && today.getUTCMonth()===m && today.getUTCDate()===d){ tr.classList.add('today'); }
        if (interdits.includes(trad)) tr.classList.add('forbidden');
        const td1=document.createElement('td'); td1.textContent=d;
        const td2=document.createElement('td'); td2.textContent=jour;
        const td3=document.createElement('td'); td3.textContent=trad;
        tr.append(td1,td2,td3); tbody.appendChild(tr);
      }
    }

    function refresh(){
      const y = parseInt(selYear.value,10);
      const m = parseInt(selMonth.value,10);
      const vName = selVillage.value;
      const vCfg = CFG.villages[vName] || {};

      titleCurr.textContent = formatMonthTitle(y,m);
      const prev=clampMonth(y,m-1), next=clampMonth(y,m+1);
      titlePrev.textContent = formatMonthTitle(prev.y, prev.m);
      titleNext.textContent = formatMonthTitle(next.y, next.m);
      labelMTrad.textContent = `M${m+1}`;

      renderMonth(prev.y, prev.m, tbodyPrev, vCfg);
      renderMonth(y, m, tbodyCurr, vCfg);
      renderMonth(next.y, next.m, tbodyNext, vCfg);

      roiVillage.textContent = vCfg.roi || '';
      infosVillage.textContent = vCfg.infos || ((vCfg.jCycle && vCfg.jCycle.length===8) ? '' : 'Données manquantes');
      const jm = vCfg.joursMarche || [];
      marche1.textContent = jm[0] || '';
      marche2.textContent = jm[1] || '';
      marche3.textContent = jm[2] || '';
      joursInterdits.textContent = (vCfg.interdits || []).join(', ');
    }

    function populateSelectors(){
      const now=new Date(), y0=now.getUTCFullYear();
      for(let y=y0-50;y<=y0+50;y++){const o=document.createElement('option');o.value=String(y);o.textContent=String(y);if(y===2026)o.selected=true;selYear.appendChild(o);}
      for(let i=0;i<12;i++){const o=document.createElement('option');o.value=String(i);o.textContent=String(i+1).padStart(2,'0');if(i===2)o.selected=true;selMonth.appendChild(o);}
      Object.keys(CFG.villages).forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;selVillage.appendChild(o);});
      if (CFG.villages['BAMENA']) selVillage.value='BAMENA';
    }

    function hookEvents(){
      const getYM=()=>({y:parseInt(selYear.value,10), m:parseInt(selMonth.value,10)});
      const setYM=(y,m)=>{selYear.value=y; selMonth.value=m; refresh();};
      const clamp=(y,m)=>clampMonth(y,m);
      document.getElementById('btnMinus3m').addEventListener('click', ()=>{const {y,m}=getYM(); const n=clamp(y,m-3); setYM(n.y,n.m);});
      document.getElementById('btnPlus3m').addEventListener('click', ()=>{const {y,m}=getYM(); const n=clamp(y,m+3); setYM(n.y,n.m);});
      document.getElementById('btnMinus1y').addEventListener('click', ()=>{selYear.value=parseInt(selYear.value,10)-1; refresh();});
      document.getElementById('btnPlus1y').addEventListener('click', ()=>{selYear.value=parseInt(selYear.value,10)+1; refresh();});
      document.getElementById('btnToday').addEventListener('click', ()=>{const t=new Date(); selYear.value=t.getUTCFullYear(); selMonth.value=t.getUTCMonth(); refresh();});
      document.getElementById('btnGoMTrad').addEventListener('click', ()=>{const m=prompt('Aller à MTrad (1..12) :', String(parseInt(selMonth.value,10)+1)); if(!m)return; const n=parseInt(m,10); if(n>=1&&n<=12){selMonth.value=n-1; refresh();} else alert('Valeur MTrad invalide.');});
      const pnl=document.getElementById('exportPanel');
      document.getElementById('btnExport').addEventListener('click', ()=>{pnl.hidden=!pnl.hidden;});
      document.getElementById('cancelPrint').addEventListener('click', ()=>{pnl.hidden=true;});
      document.getElementById('doPrint').addEventListener('click', ()=>{const val=[...document.querySelectorAll('input[name=psize]')].find(i=>i.checked)?.value||'a4p'; document.body.classList.remove('size-a4p','size-a4l','size-a3p','size-a3l'); document.body.classList.add('size-'+val); pnl.hidden=true; setTimeout(()=>window.print(),50);});
      selYear.addEventListener('change', refresh);
      selMonth.addEventListener('change', refresh);
      selVillage.addEventListener('change', refresh);
    }

    // Lancement
    window.addEventListener('load', ()=>{
      populateSelectors();
      hookEvents();
      refresh();
      // Pas de service worker ici (pour éviter la mise en cache pendant les tests locaux)
    });
  </script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
</script>
</body>
</html>
