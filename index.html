<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calendrier du Village</title>
<link rel="stylesheet" href="./styles.v3.css?v=20260311-10">
</head>
<body>

  <!-- BANDEAU BLEU TITRE -->
  <div class="site-header">Calendrier du Village</div>

  <!-- NAV (bleue) SOUS LE TITRE -->
  <div class="nav-row">
    prev3◀ -3 mois</button>
    next3+3 mois ▶</button>
    todayAujourd’hui</button>
    prevY⏮ -1 an</button>
    nextY⏭ +1 an</button>
  </div>

  <!-- PARAMÈTRES -->
  <div class="params">
    <label>Année (M) :
      <input id="param-annee" type="number" min="1900" max="2500">
    </label>

    <label>Mois (M) :
      <input id="param-mois" type="number" min="1" max="12">
    </label>

    <label>Village :
      <select id="param-village">
        <option value="ALL">Tous</option>
      </select>
    </label>

    <label>Filtre :
      <select id="param-filtre">
        <option value="tous">Tous</option>
        <option value="marché">Marchés</option>
        <option value="interdits">Interdits</option>
      </select>
    </label>
  </div>

  <!-- CALENDRIER -->
  <div id="calendar-9cols"></div>

  <!-- BLOC INFOS (si tu veux le bas de page) -->
  <h2>Roi : <span id="roi-village">—</span></h2>
  <p>Jours de marché : <span id="marche-village">—</span></p>
  <p>Informations : <span id="motif-village">—</span></p>

  <script src="./app.v3.js?v=20260311-10" defer></script>
</body>
</html>
