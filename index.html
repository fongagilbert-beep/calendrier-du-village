<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calendrier du Village</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./styles.css">

  <!-- Couleur de thème pour les barres du navigateur / OS -->
<meta name="theme-color" content="#0b3c8d">

<!-- iOS : activer le mode web app plein écran et l’icône -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Calendrier du Village">
icons/icon-192.png
  
</head>
<body>
  <header class="site-header">
    <h1>Calendrier du Village</h1>
  </header>

  <!-- NAV HAUT -->
  <nav class="nav-row nav-vibrant">
    <div class="nav-group">
      <button class="btn" data-action="prev3">−3 mois</button>
      <button class="btn" data-action="next3">+3 mois</button>
      <button class="btn" data-action="today">Aujourd’hui</button>
      <button class="btn ghost" data-action="prevY">−1 an</button>
      <button class="btn ghost" data-action="nextY">+1 an</button>
    </div>
  </nav>

  <!-- PARAMS (sous la nav) : M = mois central -->

  <button id="btnInstall" class="btn install" style="display:none;">Installer l’app</button>
  
  <section class="params-row">
    <div class="params">
      <label>Année (M) : <input type="number" id="param-annee" min="1900" max="2100" step="1" /></label>
      <label>Mois (M) : <input type="number" id="param-mois" min="1" max="12" step="1" /></label>
      <label>Village :
        <select id="param-village">
          <option value="ALL">TOUS</option>
          <option value="BALENGOU">BALENGOU</option>
          <option value="ZEUGNIA">ZEUGNIA</option>
          <option value="TIZOUEU">TIZOUEU</option>
        </select>
      </label>
      <label>Filtre :
        <select id="param-filtre">
          <option value="all">Tous</option>
          <option value="forbidden">Jours interdits</option>
          <option value="market">Jours de marché</option>
        </select>
      </label>
    </div>
  </section>

    <!-- CALENDRIER : M-1 | M | M+1 -->
  <main id="calendar-9cols" class="c9" aria-live="polite" aria-busy="false" data-watermark="VILLAGE"></main>

  <!-- BLOC D’INFOS EN BAS -->
  <section id="info-bottom" class="info-bottom">
    <div class="legend">
      <span class="chip forbid">Jour interdit</span>
      <span class="chip market">Jour de marché</span>
      <span class="chip today">Aujourd’hui</span>
    </div>
    <div class="village-meta">
      <div><strong>C42 – Roi du village :</strong> <span id="roi-village">—</span></div>
      <div><strong>C43 – Jours de marché :</strong> <span id="marche-village">—</span></div>
      <div><strong>C44 – Info :</strong> <span id="info-village">—</span></div>
    </div>
  </section>

  <footer class="footer"><small>Proposé par <strong>Gilbert FONGA</strong></small></footer>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); });
    }
  </script>
  <script src="./app.js" type="module"></script>
</body>
</html>

<script>
  // --- Android (Chrome) : bouton "Installer l’app"
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    const btn = document.getElementById('btnInstall');
    if (btn) btn.style.display = 'inline-block';
  });

  document.getElementById('btnInstall')?.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    try { await deferredPrompt.userChoice; } catch(e) {}
    deferredPrompt = null;
    document.getElementById('btnInstall').style.display = 'none';
  });

  window.addEventListener('appinstalled', () => {
    console.log('PWA installed');
  });

  // --- iPhone (Safari) : affiche une aide "Ajouter à l’écran d’accueil"
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if (isIOS && !isStandalone) {
    const tip = document.createElement('div');
    tip.id = 'ios-tip';
    tip.textContent = "Sur iPhone : touche Partager → ‘Ajouter à l’écran d’accueil’";
    const paramsBar = document.querySelector('.params-row') || document.body;
    paramsBar.appendChild(tip);
    tip.style.display = 'block';
  }
</script>
